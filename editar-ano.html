<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Ano Atual - Sistema de Escala</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        .form-container { background-color: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; color: #2c3e50; font-weight: bold; }
        .form-group select, .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .btn-submit { background-color: #2980b9; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        .btn-submit:hover { background-color: #3498db; }
        .message { margin-top: 10px; padding: 10px; border-radius: 4px; text-align: center; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .btn-voltar { display: inline-block; margin-bottom: 20px; background-color: #7f8c8d; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <main class="content">
        <a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao Painel</a>
        <h1>Editar Ano Atual</h1>
        <div class="form-container">
            <form id="editarAnoForm">
                <div class="form-group">
                    <label for="ano">Ano:</label>
                    <select id="ano" name="ano" required>
                        <!-- As opções de ano serão geradas por JavaScript -->
                        <option value="">Carregando...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição (opcional):</label>
                    <input type="text" id="descricao" name="descricao">
                </div>
                <button type="submit" class="btn-submit">Salvar Alterações</button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </main>

    <script src="firebase-config.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof db === 'undefined') { showMessage('Erro de configuração do Firebase.', 'error'); return; }

            const form = document.getElementById('editarAnoForm');
            const anoSelect = document.getElementById('ano');
            const descricaoInput = document.getElementById('descricao');
            
            // 1. Popula o dropdown de anos
            anoSelect.innerHTML = ''; // Limpa o "Carregando..."
            for (let year = 2010; year <= 2050; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                anoSelect.appendChild(option);
            }

            // 2. Carrega o ano atual do Firestore
            async function loadCurrentYear() {
                try {
                    const docRef = db.collection('painel').doc('ano');
                    const doc = await docRef.get();

                    if (doc.exists) {
                        const data = doc.data();
                        // Preenche o formulário com os dados existentes
                        anoSelect.value = data.ano;
                        descricaoInput.value = data.descricao || '';
                    } else {
                        showMessage('Documento do ano não encontrado. Crie um primeiro.', 'error');
                        form.style.display = 'none'; // Esconde o form se não houver dados
                    }
                } catch (error) {
                    showMessage('Erro ao carregar dados: ' + error.message, 'error');
                }
            }
            
            await loadCurrentYear();

            // 3. Lógica para salvar as alterações
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const updatedAno = parseInt(anoSelect.value);
                const updatedDescricao = descricaoInput.value;

                const dataToUpdate = {
                    ano: updatedAno,
                    descricao: updatedDescricao
                };

                try {
                    await db.collection('painel').doc('ano').update(dataToUpdate);
                    showMessage('Ano atualizado com sucesso!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html'; // Redireciona de volta ao painel
                    }, 1500);

                } catch (error) {
                    showMessage('Erro ao salvar alterações: ' + error.message, 'error');
                }
            });

            function showMessage(text, type) {
                const messageDiv = document.getElementById('message');
                messageDiv.textContent = text;
                messageDiv.className = `message ${type}`;
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
