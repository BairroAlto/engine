   <style>
    /* Estilos Gerais */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; display: flex; min-height: 100vh; background-color: #f5f6fa; color: #333; }

    .data-row { margin-bottom: 4px; color: #555; font-size: 15px; }
    .data-row strong { color: #2c3e50; }
    .loading-spinner { text-align: center; padding: 20px; font-size: 24px; color: #3498db; display: none; }

    @media (max-width: 1024px) {
        .action-buttons-container { margin-left: 0; width: 100%; }
    }
    @media (max-width: 768px) {
        .sidebar { width: 70px; }
        .content { margin-left: 70px; width: calc(100% - 70px); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

/* Estilo para botão Editar quando ativo */
#edit-button.active-edit {
    background-color: #e67e22; /* Laranja quando ativo */

/* Container para alinhar texto à esquerda e lápis à direita */

/* Ajuste específico para o cabeçalho da semana */

    <script>
        // Configuração Firebase...
     // Configuração Firebase...
const firebaseConfig = {
    apiKey: "AIzaSyD1fkxq6USO5RX22TlsPQFEaVSZoTj_t2A",
    authDomain: "escalas-6e0f9.firebaseapp.com",
    projectId: "escalas-6e0f9",
    storageBucket: "escalas-6e0f9.firebasestorage.app",
    messagingSenderId: "19118998563",
    appId: "1:19118998563:web:5412be658ae34bd45add96"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const monthMap = { 1: "Janeiro", 2: "Fevereiro", 3: "Março", 4: "Abril", 5: "Maio", 6: "Junho", 7: "Julho", 8: "Agosto", 9: "Setembro", 10: "Outubro", 11: "Novembro", 12: "Dezembro" };
const monthRevMap = Object.fromEntries(Object.entries(monthMap).map(([k, v]) => [v, parseInt(k)]));

let cacheHistorico = [];
let cacheHistoricoPregacao = [];
let fullPeopleCache = [];
let personMap = new Map();
let anoPredefinido = null;
let isEditMode = false;

document.addEventListener('DOMContentLoaded', async function() {
    // Carrega a sidebar
    fetch('sidebar.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById("sidebar-placeholder").innerHTML = html;

            // --- INÍCIO DA LÓGICA DE BOTÃO ATIVO ---
            // 1. Identifica o nome do arquivo atual (ex: pregacao.html)
            const currentPage = window.location.pathname.split("/").pop() || "index.html";

            // 2. Procura todos os links da sidebar
            const navLinks = document.querySelectorAll('.sidebar .nav-item a');

            navLinks.forEach(link => {
                // 3. Se o link apontar para a página atual, marca como ativo
                if (link.getAttribute('href') === currentPage) {
                    link.parentElement.classList.add('active');
                }
            });
            // --- FIM DA LÓGICA ---
        });

    await loadInitialData();

    // Listener do PDF
    document.getElementById('btn-pdf-pregacao').addEventListener('click', generatePDF);
});

async function loadInitialData() {
    const loadingEl = document.getElementById('loading');
    if (loadingEl) loadingEl.style.display = 'block';
    
    try {
        // 1. Buscar ano do painel
        const painelDoc = await db.collection('painel').doc('ano').get();
        if (painelDoc.exists) anoPredefinido = painelDoc.data().ano;

        // 2. Buscar Pessoas (Cache completo para regras de género)
        const pessoasSnap = await db.collection('pessoas').get();
        fullPeopleCache = [];
        personMap.clear();
        pessoasSnap.forEach(doc => {
            const data = doc.data();
            const personObj = { id: doc.id, ...data };
            fullPeopleCache.push(personObj);
            personMap.set(doc.id, data.nomePessoa);
        });

        // 3. Buscar Históricos (Corrigido o Promise.all)
        const [hSnap, hpSnap] = await Promise.all([
            db.collection('historico').where('tipo', '==', 'pregacao').get(),
            db.collection('historicoPregacao').get()
        ]);

        cacheHistorico = hSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        cacheHistoricoPregacao = hpSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        console.log("Caches carregados com sucesso!");
        populateYears();
    } catch (error) { 
        console.error("Erro detalhado ao carregar dados:", error); 
        alert("Erro ao carregar dados do Firebase. Verifique o console.");
    }
    if (loadingEl) loadingEl.style.display = 'none';
}

function populateYears() {
    const years = new Set();
    cacheHistorico.forEach(d => years.add(d.ano));
    cacheHistoricoPregacao.forEach(d => years.add(d.ano));
    if (anoPredefinido) years.add(parseInt(anoPredefinido));

    const select = document.getElementById('filter-ano');
    select.innerHTML = '<option value="">Ano</option>';
    Array.from(years).sort((a,b)=>b-a).forEach(y => select.add(new Option(y, y)));
    
    if (anoPredefinido && [...select.options].some(opt => opt.value == anoPredefinido)) {
        select.value = anoPredefinido;
        populateMonths();
    }
    select.onchange = populateMonths;
}

function populateMonths() {
    const year = parseInt(document.getElementById('filter-ano').value);
    if (!year) return;
    const months = new Set();
    cacheHistorico.filter(d => d.ano === year).forEach(d => months.add(monthMap[d.mes]));
    cacheHistoricoPregacao.filter(d => d.ano === year).forEach(d => months.add(typeof d.mes === 'string' ? d.mes : monthMap[d.mes]));
    
    const select = document.getElementById('filter-mes');
    select.innerHTML = '<option value="">Mês</option>';
    Array.from(months).sort((a,b)=>monthRevMap[a]-monthRevMap[b]).forEach(m => select.add(new Option(m,m)));

    const mesAtualNome = monthMap[new Date().getMonth() + 1];
    if ([...select.options].some(opt => opt.value === mesAtualNome)) {
        select.value = mesAtualNome;
        populateWeeks();
    }
    select.onchange = populateWeeks;
}

function populateWeeks() {
    const year = parseInt(document.getElementById('filter-ano').value);
    const mesName = document.getElementById('filter-mes').value;
    const weeks = new Set();
    cacheHistorico.filter(d => d.ano === year && monthMap[d.mes] === mesName).forEach(d => weeks.add(d.semanaindex));
    cacheHistoricoPregacao.filter(d => d.ano === year && (d.mes === mesName || monthMap[d.mes] === mesName)).forEach(d => weeks.add(d.semanaindex));
    const select = document.getElementById('filter-semana');
    select.innerHTML = '<option value="todas">Todas as Semanas</option>';
    Array.from(weeks).sort((a,b)=>parseInt(a.match(/\d+/))-parseInt(b.match(/\d+/))).forEach(w => select.add(new Option(w,w)));
    select.onchange = renderSchedule;
    renderSchedule();
}

function renderSchedule() {
    const year = parseInt(document.getElementById('filter-ano').value);
    const mesName = document.getElementById('filter-mes').value;
    const week = document.getElementById('filter-semana').value;
    const part = document.getElementById('filter-parte').value;
    const display = document.getElementById('schedule-display');

    if (!year || !mesName) {
        display.innerHTML = '<p style="text-align:center; padding:20px;">Selecione os filtros acima.</p>';
        return;
    }

    // Filtragem dos dados nos caches
    let hData = cacheHistorico.filter(d => d.ano === year && monthMap[d.mes] === mesName && (week === 'todas' || d.semanaindex === week));
    let hpData = cacheHistoricoPregacao.filter(d => d.ano === year && (d.mes === mesName || monthMap[d.mes] === mesName) && (week === 'todas' || d.semanaindex === week));

    // Identificar semanas únicas presentes nos dados
    const weeksFound = Array.from(new Set([...hData.map(d => d.semanaindex), ...hpData.map(d => d.semanaindex)]));
    weeksFound.sort((a,b) => parseInt(a.match(/\d+/)) - parseInt(b.match(/\d+/)));

    // Lógica do Lápis: Só aparece se uma semana específica estiver selecionada E o modo edição estiver ON
    const isSpecificWeek = week !== 'todas';
    const showPencils = isEditMode && isSpecificWeek;

    // Helper atualizado para o Lápis
    const getPencilHtml = (id, type) => {
        return showPencils ? `<i class="fas fa-pencil-alt edit-icon" onclick="openEditPopup('${id}', '${type}')"></i>` : '';
    };

    let html = '';
    weeksFound.forEach(wk => {
        // 1. Título da Semana com Lápis logo ao lado
        html += `
            <div class="week-section">
                <div class="week-title">
                    ${wk} ${getPencilHtml('id_semana', 'semana')} 
                </div>`;

        // ... (lógica de evento especial) ...

        // A) SERVIÇO DE CAMPO
        if (part === 'todas' || part === 'dirigencia saida') {
            const docs = hData.filter(d => d.semanaindex === wk);
            if (docs.length > 0) {
                html += `
                <div class="style-campo">
                    <div class="part-header"><i class="fas fa-users"></i> Serviço de Campo</div>
                    <div class="style-campo-content">`;
                
                docs.forEach(doc => {
                    (doc.designacoes || []).forEach(desig => {
                        const dirId = desig.participantes?.dirigente || desig.participantes?.participante;
                        html += `
                        <div class="sub-part">
                            <div class="edit-container">
                                <p class="data-row"><strong>Dirigente:</strong> ${desig.dia || ''} - ${desig.hora || ''}</p>
                                ${getPencilHtml(doc.id, 'campo')}
                            </div>
                            <p class="data-row" style="margin-left: 10px;"> ${personMap.get(dirId) || '---'}</p>
                        </div>`;
                    });
                });
                html += `</div></div>`;
            }
        }

        // B) TESTEMUNHO PÚBLICO
      if (part === 'todas' || part === 'testemunho publico') {
    const docs = hpData.filter(d => d.semanaindex === wk);
    if (docs.length > 0) {
        html += `
        <div class="style-testemunho" style="margin-top:25px;">
            <div class="part-header"><i class="fas fa-store"></i> Testemunho Público</div>
            <div class="style-testemunho-content">`;
        
        docs.sort((a,b)=>a.grupo-b.grupo).forEach(doc => {
            // --- NOVA LÓGICA PARA EQUIPA DINÂMICA ---
            let nomesEquipa = [];
            
            // Verifica Pessoa 1
            const p1 = doc.Pessoa1?.nome || personMap.get(doc.Pessoa1?.id);
            if (p1) nomesEquipa.push(p1);
            
            // Verifica Pessoa 2
            const p2 = doc.Pessoa2?.nome || personMap.get(doc.Pessoa2?.id);
            if (p2) nomesEquipa.push(p2);
            
            // Verifica Pessoa 3 (Caso exista)
            const p3 = doc.Pessoa3?.nome || personMap.get(doc.Pessoa3?.id);
            if (p3) nomesEquipa.push(p3);

            // Junta os nomes encontrados com " - "
            const equipaFormatada = nomesEquipa.length > 0 ? nomesEquipa.join(' - ') : '---';

            html += `
            <div class="sub-part">
                <div class="level-3-header edit-container" style="display: flex;">
                    <span>${doc.diadasemana || ''} ${doc.hora || ''}</span>
                    ${getPencilHtml(doc.id, 'publico')}
                </div>
                <p class="data-row"><strong>Equipa:</strong> ${equipaFormatada}</p>
                <p class="data-row"><strong>Local:</strong> ${doc.local || '---'}</p>
            </div>`;
        });
        html += `</div></div>`;
    }
}
        html += `</div>`;
    });

    display.innerHTML = html || '<p style="text-align:center;">Nenhum registo.</p>';
}


function suggestPerson(index) {
    const allSelects = document.querySelectorAll('.edit-select-person');
    const selectedIds = Array.from(allSelects).map(s => s.value).filter(id => id !== "");
    
    // 1. Identificar o género do grupo (baseado em quem já está selecionado)
    let targetGender = null;
    selectedIds.forEach(id => {
        const p = fullPeopleCache.find(person => person.id === id);
        if (p) targetGender = p.genero;
    });

    // 2. Filtrar candidatos elegíveis
    let candidates = fullPeopleCache.filter(p => {
        // Regra 1: Deve fazer pregação
        if (!p.fazDesignacoesPregacao) return false;
        
        // Regra 2: Não pode já estar selecionado nos outros dropdowns deste popup
        if (selectedIds.includes(p.id)) return false;
        
        // Regra 3: Se já houver alguém no grupo, deve ser do mesmo género
        if (targetGender && p.genero !== targetGender) return false;
        
        return true;
    });

    if (candidates.length === 0) {
        alert("Não foram encontradas mais pessoas elegíveis com o mesmo género.");
        return;
    }

    // 3. Escolher um candidato aleatório (ou o que menos trabalhou, se quiser expandir)
    const randomPerson = candidates[Math.floor(Math.random() * candidates.length)];
    
    // 4. Aplicar ao select
    const targetSelect = document.getElementById(`select-p${index}`);
    targetSelect.value = randomPerson.id;
    
    // Feedback visual
    targetSelect.style.borderColor = "#2ecc71";
    setTimeout(() => targetSelect.style.borderColor = "#444", 1000);
}


async function generatePDF() {
    const ano = document.getElementById('filter-ano').value;
    const mes = document.getElementById('filter-mes').value;
    if (!ano || !mes) { alert("Selecione Ano e Mês"); return; }

    const element = document.getElementById('schedule-display');
    
    // Container temporário para formatar o PDF
    const tempContainer = document.createElement('div');
    tempContainer.style.padding = "5px";
    tempContainer.style.width = "790px"; // Largura para A4
    tempContainer.style.backgroundColor = "white";
    tempContainer.style.fontFamily = "Arial, sans-serif";

    // 1. Título do PDF menor e com menos margem
    const title = document.createElement('h2');
    title.style.textAlign = 'center';
    title.style.fontSize = '18px';
    title.style.margin = '0 0 10px 0';
    title.style.paddingBottom = '5px';
    title.style.borderBottom = '2px solid #333';
    title.innerText = `ESCALA DE PREGAÇÃO - ${mes.toUpperCase()} ${ano}`;
    tempContainer.appendChild(title);

    // 2. Grid de 2 Colunas
    const gridWrapper = document.createElement('div');
    gridWrapper.style.display = "grid";
    gridWrapper.style.gridTemplateColumns = "1fr 1fr";
    gridWrapper.style.gap = "10px";
    gridWrapper.style.alignItems = "start"; // Importante para não esticar colunas
    
    const weeks = element.querySelectorAll('.week-section');
    weeks.forEach(week => {
        const weekClone = week.cloneNode(true);
        
        // --- COMPACTAÇÃO DA SEMANA ---
        weekClone.style.fontSize = "9.5px"; // Fonte levemente menor
        weekClone.style.marginBottom = "5px";
        weekClone.style.breakInside = "avoid"; // Impede quebrar a semana entre páginas

        // Ajustar Título da Semana (Azul)
        const wkTitle = weekClone.querySelector('.week-title');
        if(wkTitle) {
            wkTitle.style.padding = "4px 8px";
            wkTitle.style.fontSize = "11px";
            wkTitle.style.marginBottom = "6px";
        }

        // Ajustar Cabeçalhos (Roxo/Verde)
        const headers = weekClone.querySelectorAll('.part-header');
        headers.forEach(h => {
            h.style.padding = "3px 8px";
            h.style.fontSize = "10px";
            h.style.marginBottom = "4px";
        });

        // Compactar o conteúdo do Testemunho Público
        const subParts = weekClone.querySelectorAll('.sub-part');
        subParts.forEach(sp => {
            sp.style.marginBottom = "4px"; // Reduz distância entre horários
        });

        const level3 = weekClone.querySelectorAll('.level-3-header');
        level3.forEach(lh => {
            lh.style.fontSize = "8.5px";
            lh.style.padding = "1px 5px";
            lh.style.marginBottom = "2px";
        });

        const dataRows = weekClone.querySelectorAll('.data-row');
        dataRows.forEach(dr => {
            dr.style.marginBottom = "0px"; // Tira o espaço entre Equipa e Local
            dr.style.fontSize = "9px";
        });

        gridWrapper.appendChild(weekClone);
    });

    tempContainer.appendChild(gridWrapper);

    const opt = {
        margin: 8, // Margem da folha
        filename: `Escala_Pregacao_${mes}_${ano}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    // Gerar o PDF
    html2pdf().set(opt).from(tempContainer).save();
}

// Abrir Popup
window.openEditPopup = function(id, type) {
    console.log("Abrindo popup para:", id, "Tipo:", type);
    
    const overlay = document.getElementById('edit-popup-overlay');
    const fieldsContainer = document.getElementById('participant-fields');
    const title = document.getElementById('popup-title');
    const editForm = document.getElementById('edit-form');
    
    // 1. Configurar IDs ocultos
    document.getElementById('edit-doc-id').value = id;
    document.getElementById('edit-type').value = type;
    
    // 2. Limpar campos anteriores
    fieldsContainer.innerHTML = ''; 

    // 3. Obter participantes atuais do cache
    let currentParticipants = [];
    if (type === 'publico') {
        title.innerText = "Editar Testemunho Público";
        let reg = cacheHistoricoPregacao.find(d => d.id === id);
        if (reg) {
            if (reg.Pessoa1?.id) currentParticipants.push(reg.Pessoa1.id);
            if (reg.Pessoa2?.id) currentParticipants.push(reg.Pessoa2.id);
            if (reg.Pessoa3?.id) currentParticipants.push(reg.Pessoa3.id);
        }
    } else {
        title.innerText = "Editar Serviço de Campo";
        let reg = cacheHistorico.find(d => d.id === id);
        if (reg && reg.designacoes) {
            // Pega participantes da primeira designação encontrada
            const desig = reg.designacoes[0];
            currentParticipants = Object.values(desig.participantes || {});
        }
    }

    // 4. Gerar 3 linhas com Dropdown + Foguetão
    for (let i = 0; i < 3; i++) {
        const row = document.createElement('div');
        row.style = "display: flex; align-items: center; gap: 10px; margin-bottom: 15px;";

        const filterGroup = document.createElement('div');
        filterGroup.className = 'filter-group';
        filterGroup.style.flex = '1';

        const label = document.createElement('label');
        label.innerText = `Participante ${i + 1}`;
        label.style.color = '#888';

        const select = document.createElement('select');
        select.className = 'edit-select-person';
        select.id = `select-edit-p${i}`;
        select.style = "width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;";
        select.innerHTML = '<option value="">Selecione...</option>';
        
        // Popular Dropdown (Apenas quem faz pregação)
        fullPeopleCache
            .filter(p => p.fazDesignacoesPregacao)
            .sort((a,b) => a.nomePessoa.localeCompare(b.nomePessoa))
            .forEach(p => {
                const opt = new Option(p.nomePessoa, p.id);
                if (currentParticipants[i] === p.id) opt.selected = true;
                select.add(opt);
            });

        // Botão Foguetão
        const rocketBtn = document.createElement('button');
        rocketBtn.type = "button";
        rocketBtn.innerHTML = '<i class="fas fa-rocket"></i>';
        rocketBtn.style = "padding: 10px; background: #34495e; color: #3498db; border: 1px solid #444; border-radius: 4px; cursor: pointer;";
        rocketBtn.title = "Sugerir pessoa disponível este mês";
        rocketBtn.onclick = () => suggestPersonForEdit(i);

        filterGroup.appendChild(label);
        filterGroup.appendChild(select);
        row.appendChild(filterGroup);
        row.appendChild(rocketBtn);
        fieldsContainer.appendChild(row);
    }

    // 5. Configurar Botões de Rodapé (Eliminar e Guardar)
    // Procurar o container de botões existente
    let footer = editForm.querySelector('.footer-buttons');
    if (!footer) {
        footer = document.createElement('div');
        footer.className = 'footer-buttons';
        footer.style = "display: flex; justify-content: space-between; margin-top: 25px; gap: 10px;";
        editForm.appendChild(footer);
    }
    footer.innerHTML = ''; // Limpar botões antigos

    // Botão Eliminar
    const deleteBtn = document.createElement('button');
    deleteBtn.type = 'button';
    deleteBtn.innerText = 'Eliminar';
    deleteBtn.style = "background-color: #c0392b; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold;";
    deleteBtn.onclick = () => { document.getElementById('confirm-delete-overlay').style.display = 'flex'; };

    // Botão Guardar
    const saveBtn = document.createElement('button');
    saveBtn.id = 'btn-save-edit';
    saveBtn.type = 'button';
    saveBtn.innerText = 'Guardar';
    saveBtn.style = "background-color: #27ae60; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 18px;";
    saveBtn.onclick = handleSaveEdit; // Chama a função de salvar

    footer.appendChild(deleteBtn);
    footer.appendChild(saveBtn);

    overlay.style.display = 'flex';
};

async function handleSaveEdit() {
    const id = document.getElementById('edit-doc-id').value;
    const type = document.getElementById('edit-type').value;
    const selects = document.querySelectorAll('.edit-select-person');
    const ids = Array.from(selects).map(s => s.value);

    try {
        if (type === 'publico') {
            const updateData = {};
            for(let i=0; i<3; i++) {
                const pId = ids[i];
                const pNome = personMap.get(pId) || "";
                updateData[`Pessoa${i+1}`] = pId ? { id: pId, nome: pNome } : firebase.firestore.FieldValue.delete();
            }
            await db.collection('historicoPregacao').doc(id).update(updateData);
        } else {
            alert("Edição de Serviço de Campo ainda não implementada para múltiplos campos.");
            return;
        }
        
        document.getElementById('edit-popup-overlay').style.display = 'none';
        await loadInitialData();
        renderSchedule();
    } catch (e) {
        console.error(e);
        alert("Erro ao salvar.");
    }
}

// Lógica de sugestão inteligente
function suggestPersonForEdit(index) {
    const selects = document.querySelectorAll('.edit-select-person');
    const selectedInPopup = Array.from(selects).map(s => s.value).filter(val => val !== "");

    const anoFiltro = parseInt(document.getElementById('filter-ano').value);
    const mesFiltro = document.getElementById('filter-mes').value;

    // 1. IDs de quem já trabalhou neste mês
    const idsEscaladosNoMes = new Set();
    cacheHistoricoPregacao.forEach(reg => {
        const mesReg = typeof reg.mes === 'string' ? reg.mes : monthMap[reg.mes];
        if (reg.ano === anoFiltro && mesReg === mesFiltro) {
            if (reg.Pessoa1?.id) idsEscaladosNoMes.add(reg.Pessoa1.id);
            if (reg.Pessoa2?.id) idsEscaladosNoMes.add(reg.Pessoa2.id);
            if (reg.Pessoa3?.id) idsEscaladosNoMes.add(reg.Pessoa3.id);
        }
    });

    // 2. Género alvo
    let targetGender = null;
    selectedInPopup.forEach(id => {
        const p = fullPeopleCache.find(x => x.id === id);
        if (p) targetGender = p.genero;
    });

    // 3. Filtrar
    let candidates = fullPeopleCache.filter(p => {
        if (!p.fazDesignacoesPregacao) return false;
        if (selectedInPopup.includes(p.id)) return false; // Já no grupo atual
        if (idsEscaladosNoMes.has(p.id)) return false;   // Já trabalhou no mês
        if (targetGender && p.genero !== targetGender) return false; // Género diferente
        return true;
    });

    if (candidates.length === 0) {
        alert("Sem pessoas disponíveis (ou todas já trabalharam este mês).");
        return;
    }

    const randomP = candidates[Math.floor(Math.random() * candidates.length)];
    document.getElementById(`select-edit-p${index}`).value = randomP.id;
    
    // Feedback visual
    const sel = document.getElementById(`select-edit-p${index}`);
    sel.style.borderColor = "#2ecc71";
    setTimeout(() => sel.style.borderColor = "#444", 800);
}

                updateData[`Pessoa${i+1}`] = pId ? { id: pId, nome: pNome } : firebase.firestore.FieldValue.delete();
            }

// Confirmar e Eliminar no Firebase
document.getElementById('btn-confirm-delete-final').onclick = async function() {
    const id = document.getElementById('edit-doc-id').value;
    const type = document.getElementById('edit-type').value;

    try {
        if (type === 'publico') {
            await db.collection('historicoPregacao').doc(id).delete();
        } else if (type === 'campo') {
            // Se for Campo, depende se quer apagar o documento todo ou apenas a designação
            await db.collection('historico').doc(id).delete();
        }

        // Fechar todos os popups
        document.getElementById('confirm-delete-overlay').style.display = 'none';
        document.getElementById('edit-popup-overlay').style.display = 'none';
        
        // Atualizar interface
        alert("Designação eliminada com sucesso.");
        await loadInitialData(); // Recarrega os dados
        renderSchedule(); // Redesenha a escala
        
    } catch (error) {
        console.error("Erro ao eliminar:", error);
        alert("Erro ao eliminar a designação.");
    }
};
